apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-flair-data-pv-claim
  annotations:
    volumeType: local
    helm.sh/resource-policy: "keep"
spec:
  storageClassName: {{ .Values.scot4.flair.database.storageClassName }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.scot4.flair.database.storageCapacity }}
